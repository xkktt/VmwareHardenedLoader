name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【官方推荐】安装匹配的 Windows SDK + WDK
      - name: Install Windows Driver Kit (WDK)
        run: |
          # 1. 下载 Windows SDK 安装程序（这是微软官方支持的直链）
          curl -L -o winsdksetup.exe "https://go.microsoft.com/fwlink/p/?linkid=2233060"
          
          # 2. 静默安装指定版本的 WDK（关键：/features OptionId.WindowsDriverKit）
          Start-Process winsdksetup.exe -ArgumentList `
            "/features OptionId.WindowsDriverKit /version:10.0.26100.0 /quiet /norestart" `
            -Wait -NoNewWindow
          
          # 3. 验证安装（检查 ntddk.h 是否存在）
          if (-Not (Test-Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\km\ntddk.h")) {
            throw "WDK installation failed! ntddk.h is missing."
          }
          Write-Host "WDK 10.0.26100.0 successfully installed"

      # 使用标准 MSBuild 编译（现在系统已包含正确 WDK）
      - name: Build VmLoader
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:WindowsSDKVersion=10.0.26100.0

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
