name: Build VmLoader
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build driver
        run: msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v141

      - name: Upload sys
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64
          path: bin/x64/Release/vmloader.sys
