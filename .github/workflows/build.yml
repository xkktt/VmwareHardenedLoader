name: Build VmLoader Driver

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build driver x64 Release
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0.22621.0 /p:UseEnv=True

      - name: Upload sys file
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64
          path: bin/x64/Release/vmloader.sys
