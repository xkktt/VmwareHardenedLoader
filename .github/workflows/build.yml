name: Build VmLoader Driver

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup VS Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          spectre: true

      - name: Build x64 Release
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:DriverKitVersion=Windows10

      - name: Upload driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
