name: Build VmLoader Driver (WDK Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Windows Driver Kit (WDK)
        run: |
          # 1. 创建精准安装配置（关键：指定SDK+WDK扩展包）
          $vsConfig = @"
          {
            "version": "1.0",
            "components": [
              "Microsoft.VisualStudio.Component.Windows11SDK.22621",  # Windows 11 SDK
              "Microsoft.VisualStudio.ComponentGroup.NativeDesktop.WDK"  # 【修正】WDK扩展包
            ]
          }
          "@
          $vsConfig | Out-File vsconfig.json -Encoding UTF8

          # 2. 通过VS Installer静默安装
          Write-Host "Installing WDK components (this may take 3-5 minutes)..."
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
            modify `
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Community" `
            --config vsconfig.json `
            --passive `
            --norestart
          
          # 3. 强制刷新环境变量
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + 
                      [System.Environment]::GetEnvironmentVariable("Path", "User")
          
          # 4. 【关键修正】只检查WDK实际安装的版本
          $expectedSdk = "10.0.22621.0"
          $ntddkPath = "C:\Program Files (x86)\Windows Kits\10\Include\$expectedSdk\km\ntddk.h"
          
          # 5. 验证WDK头文件是否存在（等待+重试机制）
          $maxRetries = 5
          $retryInterval = 10
          
          for ($i = 0; $i -lt $maxRetries; $i++) {
            if (Test-Path $ntddkPath) {
              Write-Host "✅ WDK headers confirmed at $ntddkPath"
              echo "WindowsSDKVersion=$expectedSdk" >> $env:GITHUB_ENV
              exit 0
            }
            
            Write-Host "⏳ Waiting for WDK headers to register... (Attempt $($i+1)/$maxRetries)"
            Start-Sleep -Seconds $retryInterval
          }
          
          # 6. 最终验证失败
          Write-Error @"
          WDK installation FAILED!
          Expected file missing: $ntddkPath
          
          Possible causes:
          1. Incorrect WDK component selected (must use 'NativeDesktop.WDK')
          2. VS Installer timed out (check logs for 'vs_installer.exe' errors)
          3. Disk space issue (WDK requires 3+ GB free space)
          
          Run this in failed job to debug:
          Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Include' -Recurse | Where-Object Name -eq ntddk.h
          "@
          exit 1

      - name: Build VmLoader
        run: |
          # 显式指定SDK版本（避免自动选择最新版）
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 `
                /p:WindowsSDKVersion=$env:WindowsSDKVersion

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
