name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【微软官方认证】通过 VS Installer 安装 WDK
      - name: Install Windows Driver Kit (WDK)
        run: |
          # 1. 创建 VS 安装配置文件（精准指定 WDK 组件）
          $vsConfig = @"
          {
            "version": "1.0",
            "components": [
              "Microsoft.VisualStudio.Component.Windows11SDK.22621",  # Windows 11 SDK
              "Microsoft.VisualStudio.Component.WindowsDriverKit"     # WDK 核心组件
            ]
          }
          "@
          $vsConfig | Out-File -FilePath vsconfig.json -Encoding UTF8

          # 2. 使用 VS Installer 静默安装（微软唯一支持的自动化方式）
          Write-Host "Starting WDK installation via Visual Studio Installer..."
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
            modify `
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Community" `
            --config vsconfig.json `
            --passive `
            --norestart
          
          # 3. 验证 WDK 关键文件是否存在
          $wdkPath = "C:\Program Files (x86)\Windows Kits\10\Include\$env:WindowsSDKVersion\km\ntddk.h"
          if (-Not (Test-Path $wdkPath)) {
            Write-Error "WDK installation failed! Missing: $wdkPath"
            exit 1
          }
          Write-Host "WDK successfully installed at $wdkPath"

      # 使用 VS 2022 的 MSBuild 编译（自动识别 WDK 环境）
      - name: Build VmLoader
        run: |
          # 直接调用 VS 2022 的 MSBuild（已包含 WDK 路径）
          "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe" `
            VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
