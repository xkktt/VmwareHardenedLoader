name: Build VmLoader x64

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Windows Driver Kit 10
        shell: powershell
        run: |
          choco install windowsdriverkit10 -y --no-progress

      - name: Patch TargetVersion to Windows10
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            Write-Host "Patching TargetVersion in $($_.FullName)"
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '<TargetVersion>Windows7</TargetVersion>', '<TargetVersion>Windows10</TargetVersion>'
            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Disable INF verification
        shell: powershell
        run: |
          $proj = "VmLoader\VmLoader.vcxproj"

          if (Test-Path $proj) {
            Write-Host "Patching INF settings in $proj"

            $content = Get-Content $proj -Raw

            # Remove INF item from project.
            $content = $content -replace '\s*<Inf Include="VmLoader\.inf"\s*/>', ''

            # Disable INF verification properties if present.
            $content = $content -replace '<RunInfVerif>true</RunInfVerif>', '<RunInfVerif>false</RunInfVerif>'
            $content = $content -replace '<EnableInf2cat>true</EnableInf2cat>', '<EnableInf2cat>false</EnableInf2cat>'
            $content = $content -replace '<EnableInf2Cat>true</EnableInf2Cat>', '<EnableInf2Cat>false</EnableInf2Cat>'

            Set-Content $proj $content -Encoding UTF8
          } else {
            Write-Host "Project not found: $proj"
          }

      - name: Disable warnings as errors
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            Write-Host "Patching warnings in $($_.FullName)"

            $content = Get-Content $_.FullName -Raw

            # Disable existing warning-as-error settings.
            $content = $content -replace '<TreatWarningAsError>true</TreatWarningAsError>', '<TreatWarningAsError>false</TreatWarningAsError>'
            $content = $content -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>'
            $content = $content -replace '<TreatLinkerWarningAsErrors>true</TreatLinkerWarningAsErrors>', '<TreatLinkerWarningAsErrors>false</TreatLinkerWarningAsErrors>'

            # Add safe compiler options into every ClCompile node.
            $insert = @"
          <TreatWarningAsError>false</TreatWarningAsError>
          <DisableSpecificWarnings>4996;%(DisableSpecificWarnings)</DisableSpecificWarnings>
          <PreprocessorDefinitions>_CRT_SECURE_NO_WARNINGS;%(PreprocessorDefinitions)</PreprocessorDefinitions>
          <AdditionalOptions>/WX- /wd4996 %(AdditionalOptions)</AdditionalOptions>
"@

            $content = $content -replace '<ClCompile>', "<ClCompile>`r`n$insert"

            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Disable driver signing
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            Write-Host "Patching signing in $($_.FullName)"

            $content = Get-Content $_.FullName -Raw

            # Disable WDK signing modes.
            $content = $content -replace '<SignMode>TestSign</SignMode>', '<SignMode>Off</SignMode>'
            $content = $content -replace '<SignMode>ProductionSign</SignMode>', '<SignMode>Off</SignMode>'

            # Remove old local certificate reference.
            $content = $content -replace '<TestCertificate>.*?</TestCertificate>', ''

            # If signing somehow remains enabled, use SHA256 file digest.
            if ($content -match '<FileDigestAlgorithm>') {
              $content = $content -replace '<FileDigestAlgorithm>.*?</FileDigestAlgorithm>', '<FileDigestAlgorithm>SHA256</FileDigestAlgorithm>'
            }

            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Build Release x64
        shell: cmd
        run: |
          msbuild VmLoader.sln ^
            /m ^
            /t:Build ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:RunInfVerif=false ^
            /p:EnableInf2Cat=false ^
            /p:EnableInf2cat=false ^
            /p:TreatWarningAsError=false ^
            /p:TreatWarningsAsErrors=false ^
            /p:SignMode=Off ^
            /p:FileDigestAlgorithm=SHA256 ^
            /p:BuildInParallel=true

      - name: List build outputs
        shell: cmd
        if: always()
        run: |
          echo ===== SYS files =====
          dir /s /b *.sys 2>nul

          echo ===== PDB files =====
          dir /s /b *.pdb 2>nul

          echo ===== LIB files =====
          dir /s /b *.lib 2>nul

          echo ===== x64 Release directory =====
          dir /s /b x64\Release 2>nul

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VmLoader-Release-x64
          path: |
            **/x64/Release/**/*.sys
            **/x64/Release/**/*.pdb
            **/x64/Release/**/*.lib
            **/x64/Release/**/*.map
            **/x64/Release/**/*.exp
          if-no-files-found: warn
