name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【核心修复】自动下载并静默安装最新版 WDK
      - name: Install WDK
        run: |
          curl -L -o wdksetup.exe "https://go.microsoft.com/fwlink/?linkid=2249371"
          start /wait wdksetup.exe /quiet

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 编译 x64 Release 驱动
      # 移除了 PlatformToolset 参数以适配最新的 VS 2026 环境
      # 显式指定 WindowsSDKVersion 确保 WDK 能找到匹配的 ntddk.h
      - name: Build VmLoader
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:WindowsSDKVersion=10.0.26100.0

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
          if-no-files-found: error
