name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【修复】自动下载并安装最新版 WDK
      - name: Install WDK
        run: |
          # 1. 下载安装包
          curl -L -o wdksetup.exe "https://go.microsoft.com/fwlink/?linkid=2249371"
          
          # 2. 使用 Start-Process 并通过 -ArgumentList 传递参数
          # -Wait 表示等待安装完成
          # -ArgumentList "/quiet" 表示将 /quiet 作为参数传给 wdksetup.exe
          Start-Process -FilePath "wdksetup.exe" -ArgumentList "/quiet" -Wait

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 编译 x64 Release 驱动
      - name: Build VmLoader
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:WindowsSDKVersion=10.0.26100.0

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
          if-no-files-found: error
