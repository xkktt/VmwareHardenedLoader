name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Windows Driver Kit (WDK)
        run: |
          # 1. 创建精准安装配置（仅WDK核心组件）
          $vsConfig = @"
          {
            "version": "1.0",
            "components": [
              "Microsoft.VisualStudio.Component.Windows11SDK.22621",
              "Microsoft.VisualStudio.Component.WindowsDriverKit"
            ]
          }
          "@
          $vsConfig | Out-File vsconfig.json -Encoding UTF8

          # 2. 通过VS Installer静默安装
          Write-Host "Installing WDK components (this may take 3-5 minutes)..."
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
            modify `
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Community" `
            --config vsconfig.json `
            --passive `
            --norestart
          
          # 3. 【关键修复】强制刷新环境变量
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + 
                      [System.Environment]::GetEnvironmentVariable("Path", "User")
          
          # 4. 【关键修复】等待SDK注册完成（必须！）
          Write-Host "Waiting for Windows SDK registration (60 seconds)..."
          Start-Sleep -Seconds 60

          # 5. 智能检测已安装的SDK版本（避免环境变量问题）
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\Include"
          $validVersions = Get-ChildItem $sdkRoot | 
                           Where-Object { $_.PSIsContainer -and $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                           Sort-Object Name -Descending
          
          if (-not $validVersions) {
            Write-Error "No valid Windows SDK version found in $sdkRoot"
            exit 1
          }
          
          $selectedVersion = $validVersions[0].Name
          Write-Host "✅ Successfully detected Windows SDK $selectedVersion"
          
          # 6. 验证关键文件（使用检测到的版本）
          $ntddkPath = Join-Path $sdkRoot $selectedVersion "km" "ntddk.h"
          if (-not (Test-Path $ntddkPath)) {
            Write-Error "Critical error: ntddk.h missing at $ntddkPath"
            exit 1
          }
          
          # 7. 将版本写入环境变量（供后续步骤使用）
          echo "WindowsSDKVersion=$selectedVersion" >> $env:GITHUB_ENV
          Write-Host "WDK installation verified with SDK $selectedVersion"

      - name: Build VmLoader
        run: |
          # 使用检测到的SDK版本编译
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 `
                /p:WindowsSDKVersion=$env:WindowsSDKVersion

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
