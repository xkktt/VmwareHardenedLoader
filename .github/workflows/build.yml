name: Build VmLoader
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Compile driver
        run: msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Upload driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64
          path: bin/x64/Release/vmloader.sys
