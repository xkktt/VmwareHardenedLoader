name: Build VmLoader x64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Windows Driver Kit 10
        shell: powershell
        run: |
          choco install windowsdriverkit10 -y --no-progress

      - name: Patch project files
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            Write-Host "Patching $($_.FullName)"

            $content = Get-Content $_.FullName -Raw

            # WDK target version
            $content = $content -replace '<TargetVersion>Windows7</TargetVersion>', '<TargetVersion>Windows10</TargetVersion>'

            # Disable warnings as errors
            $content = $content -replace '<TreatWarningAsError>true</TreatWarningAsError>', '<TreatWarningAsError>false</TreatWarningAsError>'
            $content = $content -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>'
            $content = $content -replace '<TreatLinkerWarningAsErrors>true</TreatLinkerWarningAsErrors>', '<TreatLinkerWarningAsErrors>false</TreatLinkerWarningAsErrors>'

            # Suppress C4996 and force /WX-
            $content = $content -replace '<ClCompile>', '<ClCompile><TreatWarningAsError>false</TreatWarningAsError><DisableSpecificWarnings>4996;%(DisableSpecificWarnings)</DisableSpecificWarnings><PreprocessorDefinitions>_CRT_SECURE_NO_WARNINGS;%(PreprocessorDefinitions)</PreprocessorDefinitions><AdditionalOptions>/WX- /wd4996 %(AdditionalOptions)</AdditionalOptions>'

            # Disable driver signing
            $content = $content -replace '<SignMode>TestSign</SignMode>', '<SignMode>Off</SignMode>'
            $content = $content -replace '<SignMode>ProductionSign</SignMode>', '<SignMode>Off</SignMode>'
            $content = $content -replace '<TestCertificate>.*?</TestCertificate>', ''
            $content = $content -replace '<FileDigestAlgorithm>.*?</FileDigestAlgorithm>', '<FileDigestAlgorithm>SHA256</FileDigestAlgorithm>'

            # Disable INF checks if present
            $content = $content -replace '<RunInfVerif>true</RunInfVerif>', '<RunInfVerif>false</RunInfVerif>'
            $content = $content -replace '<EnableInf2cat>true</EnableInf2cat>', '<EnableInf2cat>false</EnableInf2cat>'
            $content = $content -replace '<EnableInf2Cat>true</EnableInf2Cat>', '<EnableInf2Cat>false</EnableInf2Cat>'

            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Remove INF from VmLoader project
        shell: powershell
        run: |
          $proj = "VmLoader\VmLoader.vcxproj"

          if (Test-Path $proj) {
            Write-Host "Removing INF item from $proj"
            $content = Get-Content $proj -Raw
            $content = $content -replace '\s*<Inf Include="VmLoader\.inf"\s*/>', ''
            Set-Content $proj $content -Encoding UTF8
          } else {
            Write-Host "Project file not found: $proj"
          }

      - name: Build Release x64
        shell: cmd
        run: |
          msbuild VmLoader.sln ^
            /m ^
            /t:Build ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:RunInfVerif=false ^
            /p:EnableInf2Cat=false ^
            /p:EnableInf2cat=false ^
            /p:TreatWarningAsError=false ^
            /p:TreatWarningsAsErrors=false ^
            /p:SignMode=Off ^
            /p:FileDigestAlgorithm=SHA256 ^
            /p:BuildInParallel=true

      - name: List build outputs
        shell: cmd
        if: always()
        run: |
          echo ===== SYS files =====
          dir /s /b *.sys 2>nul

          echo ===== PDB files =====
          dir /s /b *.pdb 2>nul

          echo ===== LIB files =====
          dir /s /b *.lib 2>nul

          echo ===== x64 Release directory =====
          dir /s /b x64\Release 2>nul

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VmLoader-Release-x64
          path: |
            **/x64/Release/**/*.sys
            **/x64/Release/**/*.pdb
            **/x64/Release/**/*.lib
            **/x64/Release/**/*.map
            **/x64/Release/**/*.exp
          if-no-files-found: warn
