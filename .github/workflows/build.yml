name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【终极修复】使用真实直链下载并挂载 Enterprise WDK (EWDK)
      - name: Setup EWDK Environment
        run: |
          $workDir = Get-Location
          $isoPath = Join-Path $workDir "ewdk.iso"
          
          # 使用微软官方的稳定直链（Visual Studio 2022 版本的 EWDK）
          Write-Host "Downloading EWDK from official direct link..."
          curl -L -o "$isoPath" "https://download.microsoft.com/download/4/8/1/4817FC6D-3A91-4C4F-B6C1-4D6C67E0556B/EWDK.iso"
          
          # 验证下载的文件大小，确保不是几十KB的假网页
          $fileSize = (Get-Item $isoPath).Length / 1GB
          Write-Host "Downloaded EWDK size: $fileSize GB"
          
          Write-Host "Mounting ISO..."
          $iso = Mount-DiskImage -ImagePath "$isoPath" -PassThru
          $driveLetter = (Get-Volume -DiskImage $iso).DriveLetter
          
          echo "EWDK_DRIVE=$driveLetter`:" >> $env:GITHUB_ENV
          echo "EWDK_LAUNCHER=$driveLetter`:\LaunchBuildEnv.cmd" >> $env:GITHUB_ENV
          Write-Host "EWDK successfully mounted at drive ${driveLetter}:"

      # 使用 EWDK 自带的 MSBuild 进行编译
      - name: Build VmLoader with EWDK
        run: |
          cmd.exe /c "`"$env:EWDK_LAUNCHER`" && msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64"

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
          if-no-files-found: error
