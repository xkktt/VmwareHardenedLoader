name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 打印当前环境的可用工具集版本，方便确认环境
      - name: Check Environment
        run: msbuild -version

      # 编译 x64 Release 驱动（使用最新的 v143 工具集）
      - name: Build VmLoader
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      # 上传编译好的 sys 文件
      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
          if-no-files-found: error
