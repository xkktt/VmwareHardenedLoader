name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 【核心修复】下载并挂载 Enterprise WDK (EWDK) 镜像
      - name: Setup EWDK Environment
        run: |
          # 1. 下载最新版 EWDK (ISO 格式，包含 VS Build Tools + SDK + WDK)
          curl -L -o ewdk.iso "https://aka.ms/EWDKLatest"
          
          # 2. 将 ISO 挂载为虚拟光驱 (盘符会自动分配，例如 D:)
          $iso = Mount-DiskImage -ImagePath "ewdk.iso" -PassThru
          $driveLetter = (Get-Volume -DiskImage $iso).DriveLetter
          
          # 3. 设置环境变量，让后续步骤能找到 EWDK 的启动脚本
          echo "EWDK_DRIVE=$driveLetter`:" >> $env:GITHUB_ENV
          echo "EWDK_LAUNCHER=$driveLetter`:\LaunchBuildEnv.cmd" >> $env:GITHUB_ENV

      # 【核心修复】使用 EWDK 自带的 MSBuild 进行编译
      - name: Build VmLoader with EWDK
        run: |
          # 调用 EWDK 的环境初始化脚本，并在该环境下执行 msbuild
          # /p:Configuration=Release /p:Platform=x64 指定编译配置
          cmd.exe /c "`"$env:EWDK_LAUNCHER`" && msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64"

      - name: Upload Driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
          if-no-files-found: error
