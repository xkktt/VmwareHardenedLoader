name: Build VmLoader
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # 🔥 这里是关键！拉子模块！
          fetch-depth: 0

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build driver
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Upload sys
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64
          path: bin/x64/Release/vmloader.sys
