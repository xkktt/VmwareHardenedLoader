name: Build VmLoader x64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Windows Driver Kit 10
        shell: powershell
        run: |
          choco install windowsdriverkit10 -y --no-progress

      - name: Patch TargetVersion Windows7 to Windows10
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            Write-Host "Patching TargetVersion in $($_.FullName)"
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '<TargetVersion>Windows7</TargetVersion>', '<TargetVersion>Windows10</TargetVersion>'
            Set-Content $_.FullName $content -Encoding UTF8
          }

      - name: Disable INF verification for CI
        shell: powershell
        run: |
          $proj = "VmLoader\VmLoader.vcxproj"
          $content = Get-Content $proj -Raw

          # 移除 INF，避免新版 WDK InfVerif 失败
          $content = $content -replace '\s*<Inf Include="VmLoader\.inf" />', ''

          Set-Content $proj $content -Encoding UTF8

      - name: Disable warnings as errors
        shell: powershell
        run: |
          $proj = "VmLoader\VmLoader.vcxproj"
          $content = Get-Content $proj -Raw

          # 关闭已有的 /WX
          $content = $content -replace '<TreatWarningAsError>true</TreatWarningAsError>', '<TreatWarningAsError>false</TreatWarningAsError>'

          # 给 Release|x64 增加禁用 C4996
          $content = $content -replace `
            '(<ItemDefinitionGroup Condition="''\$\(Configuration\)\|\$\(Platform\)''==''Release\|x64''">\s*<ClCompile>)', `
            '$1
            <TreatWarningAsError>false</TreatWarningAsError>
            <DisableSpecificWarnings>4996;%(DisableSpecificWarnings)</DisableSpecificWarnings>
            <PreprocessorDefinitions>_CRT_SECURE_NO_WARNINGS;%(PreprocessorDefinitions)</PreprocessorDefinitions>'

          Set-Content $proj $content -Encoding UTF8

      - name: Prepare output directory
        shell: cmd
        run: |
          if not exist bin mkdir bin

      - name: Build Release x64
        shell: cmd
        run: |
          msbuild VmLoader.sln ^
            /m ^
            /t:Build ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:RunInfVerif=false ^
            /p:EnableInf2Cat=false ^
            /p:TreatWarningAsError=false ^
            /p:BuildInParallel=true

      - name: List outputs
        shell: cmd
        if: always()
        run: |
          dir /s /b *.sys
          dir /s /b *.pdb
          dir /s /b *.lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VmLoader-Release-x64
          path: |
            bin/**
            **/x64/Release/**/*.sys
            **/x64/Release/**/*.pdb
            **/x64/Release/**/*.lib
