name: Build VmLoader Driver (No Sign)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 WDK10 + 构建工具（解决 ntddk.h 找不到）
      - name: Install WDK10 and build tools
        uses: fslcommunity/wdk-installer@v1

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 用 VS2022 编译驱动，自动匹配 WDK10
      - name: Build x64 Release
        run: |
          msbuild VmLoader.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      # 上传编译好的驱动
      - name: Upload compiled driver
        uses: actions/upload-artifact@v4
        with:
          name: VmLoader-x64-Release
          path: bin/x64/Release/vmloader.sys
